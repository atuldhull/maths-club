<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/css/style.css">
  <title>Registry | Join the Collective</title>
</head>
<body>

  <div style="display:flex; justify-content:center; align-items:center; min-height:90vh;">

    <div class="card" style="width:400px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">

      <h2 style="margin-top:0;">New Researcher</h2>
      <p style="color:var(--text-secondary); font-size:0.9rem;">
        Join the university's premier mathematics collective.
      </p>

      <div id="msg" style="display:none; margin-bottom:1rem; padding:10px; border-radius:8px; font-size:0.85rem;"></div>

      <form id="registerForm">

        <label style="font-size:0.8rem; color:var(--text-secondary);">Full Name</label>
        <input type="text" name="name" placeholder="Gauss Friedrich" required>

        <label style="font-size:0.8rem; color:var(--text-secondary);">Institutional Email</label>
        <input type="email" name="email" placeholder="name@college.edu" required>

        <label style="font-size:0.8rem; color:var(--text-secondary);">Security Key</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <button type="submit" class="btn-prime" style="width:100%; border:none; margin-top:1rem; cursor:pointer;">
          Register Account
        </button>

      </form>

      <p style="font-size:0.8rem; margin-top:15px;">
        Already a member? <a href="/login" style="color:var(--accent);">Login here</a>
      </p>

    </div>
  </div>

  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const form = e.target;
      const msg  = document.getElementById("msg");

      const body = {
        name:     form.name.value,
        email:    form.email.value,
        password: form.password.value
      };

      const res  = await fetch("/api/auth/register", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(body)
      });

      const data = await res.json();

      msg.style.display = "block";

      if (res.ok) {
        msg.style.background = "rgba(34,197,94,0.1)";
        msg.style.color       = "#4ade80";
        msg.style.border      = "1px solid rgba(34,197,94,0.3)";
        msg.textContent       = data.message;
        form.reset();
      } else {
        msg.style.background = "rgba(239,68,68,0.1)";
        msg.style.color       = "#f87171";
        msg.style.border      = "1px solid rgba(239,68,68,0.3)";
        msg.textContent       = data.error;
      }
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>Problem History | Math Collective</title>

<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white font-sans">

<div class="max-w-6xl mx-auto py-20 px-6">

<h1 class="text-5xl font-bold mb-12 text-center">
📜 Problem History
</h1>

<div id="history" class="space-y-8"></div>

</div>

<script>

async function loadHistory(){

const res = await fetch('/api/arena/history');

const attempts = await res.json();

const container = document.getElementById("history");

if(!attempts.length){

container.innerHTML = `
<div class="text-center text-gray-400">
No problems solved yet.
</div>
`;

return;
}

container.innerHTML = attempts.map(a => `

<div class="bg-white/5 border border-white/10 rounded-3xl p-8">

<h2 class="text-2xl font-bold mb-4">
${a.challenges.title}
</h2>

<p class="text-gray-300 mb-6">
${a.challenges.question}
</p>

<div class="grid md:grid-cols-2 gap-6">

<div>
<div class="text-gray-400 text-sm">Your Answer</div>
<div class="text-lg">${a.answer}</div>
</div>

<div>
<div class="text-gray-400 text-sm">Correct</div>
<div class="${a.correct ? 'text-green-400' : 'text-red-400'}">
${a.correct ? "✔ Correct" : "✘ Incorrect"}
</div>
</div>

<div>
<div class="text-gray-400 text-sm">XP Earned</div>
<div class="text-purple-400 font-semibold">${a.xp_earned}</div>
</div>

<div>
<div class="text-gray-400 text-sm">Solved At</div>
<div>${new Date(a.created_at).toLocaleString()}</div>
</div>

</div>

<div class="mt-8">

<h3 class="text-xl font-semibold mb-2">Solution</h3>

<p class="text-gray-300">
${a.challenges.solution || "Solution not available"}
</p>

<h3 class="text-xl font-semibold mt-6 mb-2">Alternative Method</h3>

<p class="text-gray-300">
<p><b>Theorem:</b> ${a.challenges.theorem}</p>
<p><b>Method:</b> ${a.challenges.method}</p>
<p><b>Hint:</b> ${a.challenges.hint}</p>
</div>

</div>

`).join("");

}

loadHistory();

</script>

</body>
</html>

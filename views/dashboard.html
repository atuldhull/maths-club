<!DOCTYPE html>
<html>

<head>

<title>Your History | Math Collective</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white font-sans">

<div class="max-w-6xl mx-auto py-20 px-6">

<h1 class="text-4xl font-bold mb-10">
Solved Problems
</h1>

<div id="history" class="space-y-6"></div>

</div>

<script>

async function loadHistory(){

const res = await fetch("/api/arena/history");
const attempts = await res.json();

const container = document.getElementById("history");

container.innerHTML = attempts.map(a => `

<div class="bg-white/5 border border-white/10 p-6 rounded-xl">

<h2 class="text-xl font-bold mb-2">
${a.challenges.title}
</h2>

<p class="text-gray-400 mb-4">
${a.challenges.question}
</p>

<p class="text-green-400">
Your Answer: ${a.answer}
</p>

<p class="text-gray-300 mt-3">
${a.challenges.solution}
</p>

<p class="text-gray-500 mt-2 text-sm">
XP Earned: ${a.xp_earned}
</p>

</div>

`).join("");

}

loadHistory();

</script>

</body>
</html>

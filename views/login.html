<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/css/style.css">
  <title>Archive Access | Login</title>
</head>
<body>

  <div style="display:flex; justify-content:center; align-items:center; height:100vh;">

    <div class="card" style="width:380px;">

      <h2 style="margin-top:0;">IDENTITY VERIFICATION</h2>

      <div id="msg" style="display:none; margin-bottom:1rem; padding:10px; border-radius:8px; font-size:0.85rem;"></div>

      <form id="loginForm">

        <label style="font-size:0.8rem; color:var(--text-secondary);">Email</label>
        <input type="email" name="email" placeholder="name@college.edu" required>

        <label style="font-size:0.8rem; color:var(--text-secondary);">Password</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <button type="submit"
          style="width:100%; padding:12px; margin-top:1rem; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:600; cursor:pointer;">
          AUTHENTICATE
        </button>

      </form>

      <p style="font-size:0.8rem; margin-top:15px;">
        New to the grid? <a href="/register" style="color:var(--accent);">Register here</a>
      </p>

    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const form = e.target;
      const msg  = document.getElementById("msg");

      const body = {
        email:    form.email.value,
        password: form.password.value
      };

      const res  = await fetch("/api/auth/login", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(body)
      });

      const data = await res.json();

      msg.style.display = "block";

      if (res.ok) {
        msg.style.background = "rgba(34,197,94,0.1)";
        msg.style.color       = "#4ade80";
        msg.style.border      = "1px solid rgba(34,197,94,0.3)";
        msg.textContent       = "Access granted. Redirecting...";
        setTimeout(() => window.location.href = "/", 1000);
      } else {
        msg.style.background = "rgba(239,68,68,0.1)";
        msg.style.color       = "#f87171";
        msg.style.border      = "1px solid rgba(239,68,68,0.3)";
        msg.textContent       = data.error;
      }
    });
  </script>

</body>
</html>
